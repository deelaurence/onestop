services:
  - type: web
    name: onestop
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_FRONTEND
        value: "false"
      - key: MONGODB_URI
        sync: false
